name: CI

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  checks:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run repository checks
        id: repo_checks
        continue-on-error: true
        run: python3 scripts/run_ci_checks.py --junit-xml test-results/ci.junit.xml

      - name: Publish test results
        if: (!cancelled())
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: test-results/**/*.xml
          check_name: CI Test Results
          comment_mode: off

      - name: Upload test results artifact
        if: (!cancelled())
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/**/*.xml

      - name: Fail workflow when checks fail
        if: steps.repo_checks.outcome == 'failure'
        run: exit 1
