name: Cross Eval

on:
  workflow_dispatch:
    inputs:
      scenario:
        description: "Scenario file under evals/cross-eval/scenarios/"
        required: true
        default: "evals/cross-eval/scenarios/tier1_leader_smoke.json"
        type: string
      codex_model:
        description: "Codex model"
        required: true
        default: "gpt-5-codex"
        type: string
      claude_model:
        description: "Claude model"
        required: true
        default: "claude-sonnet-4-20250514"
        type: string
      max_attempts:
        description: "Maximum alternating attempts before success"
        required: true
        default: "2"
        type: string
      mock_run:
        description: "Use fixture output instead of live model calls"
        required: true
        default: true
        type: boolean

permissions:
  contents: read
  checks: write
  id-token: write

jobs:
  mock-cross-eval:
    if: ${{ inputs.mock_run }}
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: python3 -m pip install -r requirements.txt

      - name: Refresh checked-in fixtures
        run: python3 scripts/render_cross_eval_fixtures.py "${{ inputs.scenario }}"

      - name: Run mock cross-eval session
        id: cross_eval
        continue-on-error: true
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python3 scripts/run_cross_eval_session.py \
            --scenario "${{ inputs.scenario }}" \
            --output-root cross-eval \
            --junit-xml test-results/cross-eval.junit.xml \
            --codex-model "${{ inputs.codex_model }}" \
            --claude-model "${{ inputs.claude_model }}" \
            --max-attempts "${{ inputs.max_attempts }}" \
            --mock

      - name: Add workflow summary
        if: ${{ !cancelled() && hashFiles('cross-eval/reports/summary.md') != '' }}
        run: cat cross-eval/reports/summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Publish cross-eval results
        if: ${{ !cancelled() && hashFiles('test-results/cross-eval.junit.xml') != '' }}
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: test-results/cross-eval.junit.xml
          check_name: Cross Eval Results
          comment_mode: off

      - name: Upload cross-eval artifacts
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: cross-eval
          path: |
            cross-eval/**
            test-results/cross-eval.junit.xml

      - name: Fail workflow when cross-eval fails
        if: steps.cross_eval.outcome == 'failure'
        run: exit 1

  codex-attempt-1:
    if: ${{ !inputs.mock_run }}
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Verify OpenAI secret
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: test -n "$OPENAI_API_KEY"

      - name: Refresh checked-in fixtures
        run: python3 scripts/render_cross_eval_fixtures.py "${{ inputs.scenario }}"

      - name: Validate supported attempt count
        run: test "${{ inputs.max_attempts }}" -ge 1 && test "${{ inputs.max_attempts }}" -le 2

      - name: Prepare cross-eval prompts
        run: |
          python3 scripts/run_cross_eval_session.py \
            --scenario "${{ inputs.scenario }}" \
            --output-root cross-eval \
            --codex-model "${{ inputs.codex_model }}" \
            --claude-model "${{ inputs.claude_model }}" \
            --max-attempts "${{ inputs.max_attempts }}" \
            --prepare-only

      - name: Attempt 1 generate with Codex
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt-file: cross-eval/attempt-01-codex-by-claude/prompts/codex-generate.txt
          output-file: cross-eval/attempt-01-codex-by-claude/outputs/codex-generated.md
          working-directory: .
          sandbox: read-only
          codex-args: --model ${{ inputs.codex_model }}

      - name: Upload attempt 1 artifact
        uses: actions/upload-artifact@v4
        with:
          name: cross-eval-attempt-01
          path: cross-eval/attempt-01-codex-by-claude/**

  claude-attempt-2:
    if: ${{ !inputs.mock_run && fromJSON(inputs.max_attempts) >= 2 }}
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Verify Anthropic secret
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: test -n "$ANTHROPIC_API_KEY"

      - name: Refresh checked-in fixtures
        run: python3 scripts/render_cross_eval_fixtures.py "${{ inputs.scenario }}"

      - name: Prepare cross-eval prompts
        run: |
          python3 scripts/run_cross_eval_session.py \
            --scenario "${{ inputs.scenario }}" \
            --output-root cross-eval \
            --codex-model "${{ inputs.codex_model }}" \
            --claude-model "${{ inputs.claude_model }}" \
            --max-attempts "${{ inputs.max_attempts }}" \
            --prepare-only

      - name: Load attempt 2 Claude prompt
        id: attempt_2_prompt
        run: |
          {
            echo 'prompt<<EOF'
            cat cross-eval/attempt-02-claude-by-codex/prompts/claude-generate.txt
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Attempt 2 generate with Claude
        id: attempt_2_claude
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ github.token }}
          prompt: ${{ steps.attempt_2_prompt.outputs.prompt }}
          claude_args: |
            --model ${{ inputs.claude_model }}
            --max-turns 8

      - name: Extract attempt 2 Claude output
        run: |
          python3 scripts/extract_claude_action_output.py \
            --input "${{ steps.attempt_2_claude.outputs.execution_file }}" \
            --output cross-eval/attempt-02-claude-by-codex/outputs/claude-generated.md

      - name: Upload attempt 2 artifact
        uses: actions/upload-artifact@v4
        with:
          name: cross-eval-attempt-02
          path: cross-eval/attempt-02-claude-by-codex/**

  evaluate-cross-eval:
    if: ${{ !inputs.mock_run }}
    needs:
      - codex-attempt-1
      - claude-attempt-2
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: python3 -m pip install -r requirements.txt

      - name: Verify live-run secrets
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          test -n "$OPENAI_API_KEY"
          test -n "$ANTHROPIC_API_KEY"

      - name: Refresh checked-in fixtures
        run: python3 scripts/render_cross_eval_fixtures.py "${{ inputs.scenario }}"

      - name: Prepare cross-eval prompts
        run: |
          python3 scripts/run_cross_eval_session.py \
            --scenario "${{ inputs.scenario }}" \
            --output-root cross-eval \
            --codex-model "${{ inputs.codex_model }}" \
            --claude-model "${{ inputs.claude_model }}" \
            --max-attempts "${{ inputs.max_attempts }}" \
            --prepare-only

      - name: Download attempt 1 artifact
        uses: actions/download-artifact@v4
        with:
          name: cross-eval-attempt-01
          path: cross-eval/attempt-01-codex-by-claude

      - name: Download attempt 2 artifact
        if: ${{ fromJSON(inputs.max_attempts) >= 2 }}
        uses: actions/download-artifact@v4
        with:
          name: cross-eval-attempt-02
          path: cross-eval/attempt-02-claude-by-codex

      - name: Evaluate generated outputs
        id: cross_eval_live
        continue-on-error: true
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python3 scripts/run_cross_eval_session.py \
            --scenario "${{ inputs.scenario }}" \
            --output-root cross-eval \
            --junit-xml test-results/cross-eval.junit.xml \
            --codex-model "${{ inputs.codex_model }}" \
            --claude-model "${{ inputs.claude_model }}" \
            --max-attempts "${{ inputs.max_attempts }}" \
            --use-existing-outputs

      - name: Add workflow summary
        if: ${{ !cancelled() && hashFiles('cross-eval/reports/summary.md') != '' }}
        run: cat cross-eval/reports/summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Publish cross-eval results
        if: ${{ !cancelled() && hashFiles('test-results/cross-eval.junit.xml') != '' }}
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: test-results/cross-eval.junit.xml
          check_name: Cross Eval Results
          comment_mode: off

      - name: Upload cross-eval artifacts
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: cross-eval
          path: |
            cross-eval/**
            test-results/cross-eval.junit.xml

      - name: Fail workflow when cross-eval fails
        if: steps.cross_eval_live.outcome == 'failure'
        run: exit 1
