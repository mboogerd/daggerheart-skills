name: Cross Eval

on:
  workflow_dispatch:
    inputs:
      scenario:
        description: "Scenario file under evals/cross-eval/scenarios/"
        required: true
        default: "evals/cross-eval/scenarios/tier1_leader_smoke.json"
        type: string
      openai_executor:
        description: "OpenAI executor model"
        required: true
        default: "gpt-5.4-nano"
        type: string
      anthropic_executor:
        description: "Anthropic executor model"
        required: true
        default: "claude-haiku-4-5-20251001"
        type: string
      openai_judge:
        description: "OpenAI judge model"
        required: true
        default: "gpt-5.4"
        type: string
      anthropic_judge:
        description: "Anthropic judge model"
        required: true
        default: "claude-haiku-4-5-20251001"
        type: string
      mock_run:
        description: "Use fixture output instead of live model calls"
        required: true
        default: true
        type: boolean

permissions:
  contents: read
  checks: write
  id-token: write

jobs:
  mock-openai-by-anthropic:
    if: ${{ inputs.mock_run }}
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: python3 -m pip install -r requirements.txt

      - name: Refresh checked-in fixtures
        run: python3 scripts/render_cross_eval_fixtures.py "${{ inputs.scenario }}"

      - name: Run mock openai-by-anthropic lane
        id: mock_lane
        continue-on-error: true
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python3 scripts/run_cross_eval_session.py \
            --scenario "${{ inputs.scenario }}" \
            --output-root cross-eval-openai-by-anthropic \
            --junit-xml test-results/openai-by-anthropic.junit.xml \
            --executor "${{ inputs.openai_executor }}" \
            --judge "${{ inputs.anthropic_judge }}" \
            --mock

      - name: Add workflow summary
        if: ${{ !cancelled() && hashFiles('cross-eval-openai-by-anthropic/reports/summary.md') != '' }}
        run: cat cross-eval-openai-by-anthropic/reports/summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Publish mock results
        if: ${{ !cancelled() && hashFiles('test-results/openai-by-anthropic.junit.xml') != '' }}
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: test-results/openai-by-anthropic.junit.xml
          check_name: Cross Eval Mock openai-by-anthropic
          comment_mode: off

      - name: Upload mock artifacts
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: cross-eval-openai-by-anthropic
          path: |
            cross-eval-openai-by-anthropic/**
            test-results/openai-by-anthropic.junit.xml

      - name: Fail workflow when lane fails
        if: steps.mock_lane.outcome == 'failure'
        run: exit 1

  mock-anthropic-by-openai:
    if: ${{ inputs.mock_run }}
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: python3 -m pip install -r requirements.txt

      - name: Refresh checked-in fixtures
        run: python3 scripts/render_cross_eval_fixtures.py "${{ inputs.scenario }}"

      - name: Run mock anthropic-by-openai lane
        id: mock_lane
        continue-on-error: true
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python3 scripts/run_cross_eval_session.py \
            --scenario "${{ inputs.scenario }}" \
            --output-root cross-eval-anthropic-by-openai \
            --junit-xml test-results/anthropic-by-openai.junit.xml \
            --executor "${{ inputs.anthropic_executor }}" \
            --judge "${{ inputs.openai_judge }}" \
            --mock

      - name: Add workflow summary
        if: ${{ !cancelled() && hashFiles('cross-eval-anthropic-by-openai/reports/summary.md') != '' }}
        run: cat cross-eval-anthropic-by-openai/reports/summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Publish mock results
        if: ${{ !cancelled() && hashFiles('test-results/anthropic-by-openai.junit.xml') != '' }}
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: test-results/anthropic-by-openai.junit.xml
          check_name: Cross Eval Mock anthropic-by-openai
          comment_mode: off

      - name: Upload mock artifacts
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: cross-eval-anthropic-by-openai
          path: |
            cross-eval-anthropic-by-openai/**
            test-results/anthropic-by-openai.junit.xml

      - name: Fail workflow when lane fails
        if: steps.mock_lane.outcome == 'failure'
        run: exit 1

  openai-by-anthropic:
    if: ${{ !inputs.mock_run }}
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: python3 -m pip install -r requirements.txt

      - name: Verify secrets
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          test -n "$OPENAI_API_KEY"
          test -n "$ANTHROPIC_API_KEY"

      - name: Refresh checked-in fixtures
        run: python3 scripts/render_cross_eval_fixtures.py "${{ inputs.scenario }}"

      - name: Prepare lane prompts
        run: |
          python3 scripts/run_cross_eval_session.py \
            --scenario "${{ inputs.scenario }}" \
            --output-root cross-eval-openai-by-anthropic \
            --executor "${{ inputs.openai_executor }}" \
            --judge "${{ inputs.anthropic_judge }}" \
            --prepare-only

      - name: Generate with OpenAI
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt-file: cross-eval-openai-by-anthropic/attempt-01-openai-by-anthropic/prompts/openai-generate.txt
          output-file: cross-eval-openai-by-anthropic/attempt-01-openai-by-anthropic/outputs/openai-generated.md
          working-directory: .
          sandbox: read-only
          codex-args: --model ${{ inputs.openai_executor }}

      - name: Evaluate lane
        id: lane_eval
        continue-on-error: true
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python3 scripts/run_cross_eval_session.py \
            --scenario "${{ inputs.scenario }}" \
            --output-root cross-eval-openai-by-anthropic \
            --junit-xml test-results/openai-by-anthropic.junit.xml \
            --executor "${{ inputs.openai_executor }}" \
            --judge "${{ inputs.anthropic_judge }}" \
            --use-existing-outputs

      - name: Add workflow summary
        if: ${{ !cancelled() && hashFiles('cross-eval-openai-by-anthropic/reports/summary.md') != '' }}
        run: cat cross-eval-openai-by-anthropic/reports/summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Publish lane results
        if: ${{ !cancelled() && hashFiles('test-results/openai-by-anthropic.junit.xml') != '' }}
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: test-results/openai-by-anthropic.junit.xml
          check_name: Cross Eval openai-by-anthropic
          comment_mode: off

      - name: Upload lane artifacts
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: cross-eval-openai-by-anthropic
          path: |
            cross-eval-openai-by-anthropic/**
            test-results/openai-by-anthropic.junit.xml

      - name: Fail workflow when lane fails
        if: steps.lane_eval.outcome == 'failure'
        run: exit 1

  anthropic-by-openai:
    if: ${{ !inputs.mock_run }}
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: python3 -m pip install -r requirements.txt

      - name: Verify secrets
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          test -n "$OPENAI_API_KEY"
          test -n "$ANTHROPIC_API_KEY"

      - name: Refresh checked-in fixtures
        run: python3 scripts/render_cross_eval_fixtures.py "${{ inputs.scenario }}"

      - name: Prepare lane prompts
        run: |
          python3 scripts/run_cross_eval_session.py \
            --scenario "${{ inputs.scenario }}" \
            --output-root cross-eval-anthropic-by-openai \
            --executor "${{ inputs.anthropic_executor }}" \
            --judge "${{ inputs.openai_judge }}" \
            --prepare-only

      - name: Load Anthropic prompt
        id: lane_prompt
        run: |
          {
            echo 'prompt<<EOF'
            cat cross-eval-anthropic-by-openai/attempt-01-anthropic-by-openai/prompts/anthropic-generate.txt
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Generate with Anthropic
        id: lane_anthropic
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ github.token }}
          prompt: ${{ steps.lane_prompt.outputs.prompt }}
          claude_args: |
            --model ${{ inputs.anthropic_executor }}
            --max-turns 8

      - name: Extract Anthropic output
        run: |
          python3 scripts/extract_claude_action_output.py \
            --input "${{ steps.lane_anthropic.outputs.execution_file }}" \
            --output cross-eval-anthropic-by-openai/attempt-01-anthropic-by-openai/outputs/anthropic-generated.md

      - name: Evaluate lane
        id: lane_eval
        continue-on-error: true
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python3 scripts/run_cross_eval_session.py \
            --scenario "${{ inputs.scenario }}" \
            --output-root cross-eval-anthropic-by-openai \
            --junit-xml test-results/anthropic-by-openai.junit.xml \
            --executor "${{ inputs.anthropic_executor }}" \
            --judge "${{ inputs.openai_judge }}" \
            --use-existing-outputs

      - name: Add workflow summary
        if: ${{ !cancelled() && hashFiles('cross-eval-anthropic-by-openai/reports/summary.md') != '' }}
        run: cat cross-eval-anthropic-by-openai/reports/summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Publish lane results
        if: ${{ !cancelled() && hashFiles('test-results/anthropic-by-openai.junit.xml') != '' }}
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: test-results/anthropic-by-openai.junit.xml
          check_name: Cross Eval anthropic-by-openai
          comment_mode: off

      - name: Upload lane artifacts
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: cross-eval-anthropic-by-openai
          path: |
            cross-eval-anthropic-by-openai/**
            test-results/anthropic-by-openai.junit.xml

      - name: Fail workflow when lane fails
        if: steps.lane_eval.outcome == 'failure'
        run: exit 1
